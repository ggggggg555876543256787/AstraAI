<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraAI — Неоновый Пингвин</title>
    
    <!-- Marked.js для рендеринга Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Highlight.js для подсветки синтаксиса (Тема Atom One Dark) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="sidebar">
        <button class="new-chat-btn" onclick="createNewChat()">+ Новый чат</button>
        <div class="chats-list" id="chatsList"></div>
        <button class="settings-btn" onclick="openSettings()">⚙️ Настройки</button>
    </div>

    <div class="main-container">
        <div class="chat-header" id="chatHeader">Выберите или создайте чат</div>
        <div class="chat-messages" id="chatMessages">
            <div class="placeholder-text">Общайтесь в неоновом стиле ✨</div>
        </div>
        
        <div class="chat-input-area" id="inputArea">
            <textarea id="messageInput" placeholder="Напишите сообщение... (Shift+Enter для новой строки)" onkeydown="handleKeyPress(event)"></textarea>
            <button class="send-btn" onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <div class="settings-modal" id="settingsModal">
        <div class="settings-content">
            <h3>⚙️ Настройки AstraAI</h3>
            <div class="setting-item">
                <label>Модель Ollama:</label>
                <input type="text" id="modelInput" value="qwen3b:latest">
            </div>
            <div class="setting-item">
                <label>Звуковые эффекты:</label>
                <input type="checkbox" id="soundToggle" checked>
            </div>
            <div class="settings-actions">
                <button class="save-btn" onclick="saveSettings()">Сохранить</button>
                <button class="close-btn" onclick="closeSettings()">Закрыть</button>
            </div>
        </div>
    </div>

    <div class="penguin-widget">
        <span class="penguin-icon">🐧</span>
        <span class="penguin-status">AstraAI Online</span>
    </div>

    <script src="/static/script.js" defer></script>
</body>
</html>
